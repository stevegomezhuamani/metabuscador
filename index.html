<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Metabuscador · Demo</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --border: #334155;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --hover: #2a3a52;
        --live: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
      }
      .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
      h1 { font-size: 28px; margin: 0 0 4px; }
      .lede { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
      .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
      .tab {
        padding: 8px 16px; font-size: 14px; cursor: pointer;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 999px; color: var(--muted); transition: all .15s;
      }
      .tab:hover { color: var(--text); }
      .tab.active { background: var(--accent); color: #06283d; border-color: var(--accent); font-weight: 600; }
      input[type="search"] {
        width: 100%;
        padding: 14px 18px;
        font-size: 17px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        outline: none;
        transition: border-color .15s;
      }
      input[type="search"]:focus { border-color: var(--accent); }
      .meta { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 8px; color: var(--muted); font-size: 13px; }
      .bykind { display: flex; gap: 8px; flex-wrap: wrap; }
      .results { display: grid; gap: 10px; margin-top: 12px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .card .name { font-weight: 600; font-size: 16px; }
      .card .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; color: var(--muted); font-size: 13px; align-items: center; }
      .pill { background: #0f172a; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); }
      .kind {
        font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
        padding: 2px 8px; border-radius: 999px; font-weight: 600;
      }
      .kind-sport-event { background: #1e3a8a; color: #bfdbfe; }
      .kind-casino-game { background: #5b21b6; color: #ddd6fe; }
      .kind-virtual-game { background: #065f46; color: #a7f3d0; }
      .live { color: var(--live); font-weight: 600; }
      .empty { color: var(--muted); padding: 30px 0; text-align: center; }
      mark { background: #fde68a55; color: var(--text); padding: 0 2px; border-radius: 3px; }
      .err { color: #fca5a5; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Metabuscador · demo</h1>
      <p class="lede">
        Buscador híbrido contra <code id="apiLabel"></code>.
        Tolera typos y prefijos. Elige una categoría y escribe.
      </p>

      <div class="tabs" id="tabs">
        <div class="tab active" data-cat="todo">Todo</div>
        <div class="tab" data-cat="deportes">Deportes</div>
        <div class="tab" data-cat="casino">Casino</div>
        <div class="tab" data-cat="virtuales">Virtuales</div>
      </div>

      <input
        id="q"
        type="search"
        placeholder="Busca un equipo, liga, juego…"
        autocomplete="off"
        spellcheck="false"
      />

      <div class="meta">
        <span id="status">Escribe para buscar</span>
        <span id="timing"></span>
      </div>
      <div class="bykind" id="bykind"></div>

      <div id="results" class="results"></div>
    </div>

    <script>
      const API_BASE = "https://search-gaming.api.dev.kurax.dev/bsn-metasearch/v1";
      document.getElementById("apiLabel").textContent = API_BASE;

      // Cada categoría: endpoint, cómo extraer la lista, y cómo normalizar un item.
      const CATEGORIES = {
        todo: {
          url: (q) => `${API_BASE}/products/search?q=${encodeURIComponent(q)}`,
          list: (d) => d.products || [],
          norm: (p) => ({
            kind: p.kind,
            title: p.title,
            tags: (p.subtitle || "").split(" · ").filter(Boolean),
          }),
        },
        deportes: {
          url: (q) => `${API_BASE}/sports-events/search?q=${encodeURIComponent(q)}`,
          list: (d) => d.events || [],
          norm: (e) => ({
            kind: "sport-event",
            title: e.eventName,
            live: e.isLive,
            tags: [e.sportName, e.leagueName, e.regionName, e.startEventDate].filter(Boolean),
          }),
        },
        casino: {
          url: (q) => `${API_BASE}/casino-games/search?q=${encodeURIComponent(q)}`,
          list: (d) => d.games || [],
          norm: (g) => ({
            kind: "casino-game",
            title: g.name,
            tags: [g.provider, g.type].filter(Boolean),
          }),
        },
        virtuales: {
          url: (q) => `${API_BASE}/virtual-games/search?q=${encodeURIComponent(q)}`,
          list: (d) => d.games || [],
          norm: (g) => ({
            kind: "virtual-game",
            title: g.name,
            tags: [g.provider, g.type].filter(Boolean),
          }),
        },
      };

      let activeCat = "todo";
      let lastReq = 0;

      const $q = document.getElementById("q");
      const $results = document.getElementById("results");
      const $status = document.getElementById("status");
      const $timing = document.getElementById("timing");
      const $bykind = document.getElementById("bykind");
      const $tabs = document.getElementById("tabs");

      const debounce = (fn, ms) => {
        let t;
        return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
      };

      const escapeHtml = (s) =>
        String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

      const highlight = (text, q) => {
        const safe = escapeHtml(text);
        const tokens = q.split(/\s+/).filter((t) => t.length >= 2);
        if (!tokens.length) return safe;
        const re = new RegExp("(" + tokens.map((t) => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|") + ")", "gi");
        return safe.replace(re, "<mark>$1</mark>");
      };

      const KIND_LABEL = {
        "sport-event": "deporte",
        "casino-game": "casino",
        "virtual-game": "virtual",
      };

      function card(item, q) {
        const kindBadge =
          activeCat === "todo"
            ? `<span class="kind kind-${item.kind}">${KIND_LABEL[item.kind] || item.kind}</span>`
            : "";
        const liveBadge = item.live ? `<span class="live">● EN VIVO</span>` : "";
        const tags = item.tags.map((t) => `<span class="pill">${escapeHtml(t)}</span>`).join("");
        return `
          <div class="card">
            <div class="name">${highlight(item.title || "", q)}</div>
            <div class="row">${kindBadge}${liveBadge}${tags}</div>
          </div>`;
      }

      function renderByKind(data) {
        if (activeCat !== "todo" || !data.byKind) { $bykind.innerHTML = ""; return; }
        const k = data.byKind;
        $bykind.innerHTML = [
          `<span class="pill">deportes: ${k.sportEvents}</span>`,
          `<span class="pill">casino: ${k.casinoGames}</span>`,
          `<span class="pill">virtuales: ${k.virtualGames}</span>`,
        ].join("");
      }

      const search = debounce(async () => {
        const q = $q.value.trim();
        $bykind.innerHTML = "";
        if (q.length < 2) {
          $results.innerHTML = "";
          $status.textContent = "Escribe al menos 2 caracteres";
          $timing.textContent = "";
          return;
        }
        const reqId = ++lastReq;
        $status.textContent = "Buscando…";
        const cat = CATEGORIES[activeCat];
        try {
          const r = await fetch(cat.url(q));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const data = await r.json();
          if (reqId !== lastReq) return;

          const items = cat.list(data).map(cat.norm);
          $timing.textContent = data.searchTime != null ? `${data.searchTime} ms` : "";
          renderByKind(data);

          if (!items.length) {
            $results.innerHTML = `<div class="empty">Sin resultados para «${escapeHtml(q)}»</div>`;
            $status.textContent = "0 resultados";
            return;
          }
          $status.textContent = `${data.total ?? items.length} resultado${(data.total ?? items.length) === 1 ? "" : "s"}`;
          $results.innerHTML = items.map((it) => card(it, q)).join("");
        } catch (err) {
          if (reqId !== lastReq) return;
          $status.innerHTML = `<span class="err">Error: ${escapeHtml(err.message)}</span>`;
          $results.innerHTML = "";
          $timing.textContent = "";
        }
      }, 350);

      $q.addEventListener("input", search);

      $tabs.addEventListener("click", (e) => {
        const tab = e.target.closest(".tab");
        if (!tab) return;
        activeCat = tab.dataset.cat;
        document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t === tab));
        search();
        $q.focus();
      });
    </script>
  </body>
</html>
