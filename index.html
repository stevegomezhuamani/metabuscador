<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Metabuscador · Demo</title>
    <style>
      :root {
        --bg: #0f172a;
        --panel: #1e293b;
        --border: #334155;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --accent: #38bdf8;
        --hover: #2a3a52;
        --live: #f87171;
      }
      * { box-sizing: border-box; }
      body {
        font: 15px/1.5 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        margin: 0;
        min-height: 100vh;
      }
      .wrap { max-width: 820px; margin: 0 auto; padding: 32px 20px 80px; }
      h1 { font-size: 28px; margin: 0 0 4px; }
      .lede { color: var(--muted); margin: 0 0 20px; font-size: 14px; }
      .tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
      .tab {
        padding: 8px 16px; font-size: 14px; cursor: pointer;
        background: var(--panel); border: 1px solid var(--border);
        border-radius: 999px; color: var(--muted); transition: all .15s;
      }
      .tab:hover { color: var(--text); }
      .tab.active { background: var(--accent); color: #06283d; border-color: var(--accent); font-weight: 600; }
      input[type="search"] {
        width: 100%;
        padding: 14px 18px;
        font-size: 17px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text);
        outline: none;
        transition: border-color .15s;
      }
      input[type="search"]:focus { border-color: var(--accent); }
      .meta { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 8px; color: var(--muted); font-size: 13px; }
      .bykind { display: flex; gap: 8px; flex-wrap: wrap; }
      .results { display: grid; gap: 10px; margin-top: 12px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 14px 16px;
      }
      .card .name { font-weight: 600; font-size: 16px; }
      .card .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; color: var(--muted); font-size: 13px; align-items: center; }
      .pill { background: #0f172a; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); }
      .kind {
        font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
        padding: 2px 8px; border-radius: 999px; font-weight: 600;
      }
      .kind-sport-event { background: #1e3a8a; color: #bfdbfe; }
      .kind-casino-game { background: #5b21b6; color: #ddd6fe; }
      .kind-virtual-game { background: #065f46; color: #a7f3d0; }
      .live { color: var(--live); font-weight: 600; }
      .gender {
        font-size: 11px; text-transform: uppercase; letter-spacing: .04em;
        padding: 2px 8px; border-radius: 999px; font-weight: 600;
      }
      .gender-f { background: #831843; color: #fbcfe8; }
      .gender-m { background: #1e293b; color: #93c5fd; border: 1px solid #334155; }

      /* Chips de sugerencia (alias multi-entity) */
      .suggestions {
        margin: 14px 0 6px;
        padding: 12px 14px;
        background: #1e293b;
        border: 1px solid #334155;
        border-left: 3px solid var(--accent);
        border-radius: 8px;
        font-size: 13px;
      }
      .suggestions-label { color: var(--muted); margin-right: 8px; }
      .suggestion-chip {
        display: inline-block;
        background: #334155;
        color: var(--text);
        padding: 4px 12px;
        border-radius: 999px;
        margin: 2px 4px 2px 0;
        cursor: pointer;
        border: 1px solid #475569;
        font-weight: 500;
        transition: background .15s;
      }
      .suggestion-chip:hover { background: var(--accent); color: #0f172a; }
      .empty { color: var(--muted); padding: 30px 0; text-align: center; }
      mark { background: #fde68a55; color: var(--text); padding: 0 2px; border-radius: 3px; }
      .err { color: #fca5a5; }

      /* Debug panel — botón flotante + drawer con estado del backend */
      .debug-fab {
        position: fixed; bottom: 18px; right: 18px; z-index: 100;
        background: #1e293b; color: #f1f5f9; border: 1px solid #334155;
        border-radius: 999px; padding: 10px 16px; cursor: pointer;
        font: 13px/1 system-ui; box-shadow: 0 4px 12px rgba(0,0,0,.4);
      }
      .debug-fab:hover { background: #334155; }
      .debug-panel {
        position: fixed; bottom: 70px; right: 18px; z-index: 100;
        background: #0f172a; border: 1px solid #334155; border-radius: 12px;
        padding: 16px 18px; width: 420px; max-height: 70vh; overflow: auto;
        font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
        box-shadow: 0 8px 24px rgba(0,0,0,.6);
      }
      .debug-panel.hidden { display: none; }
      .debug-panel h3 { margin: 0 0 8px; font-size: 13px; color: #f1f5f9; }
      .debug-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px dashed #1e293b; }
      .debug-row span:first-child { color: #94a3b8; }
      .debug-row span:last-child { color: #f1f5f9; }
      .debug-pill {
        display: inline-block; padding: 1px 6px; border-radius: 4px;
        font-size: 10px; font-weight: 700; letter-spacing: .04em;
      }
      .debug-ok { background: #14532d; color: #86efac; }
      .debug-warn { background: #713f12; color: #fde68a; }
      .debug-bad { background: #7f1d1d; color: #fca5a5; }
      .debug-section { margin-top: 12px; }
      .debug-section h4 { margin: 0 0 4px; font-size: 12px; color: #93c5fd; }
      .debug-actions { margin-top: 12px; display: flex; gap: 8px; }
      .debug-btn {
        background: #1e293b; border: 1px solid #334155; color: #f1f5f9;
        border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 11px;
      }
      .debug-btn:hover { background: #334155; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Metabuscador · demo</h1>
      <p class="lede">
        Buscador híbrido contra <code id="apiLabel"></code>.
        Tolera typos y prefijos. Elige una categoría y escribe.
      </p>

      <div class="tabs" id="tabs">
        <div class="tab active" data-cat="todo">Todo</div>
        <div class="tab" data-cat="deportes">Deportes</div>
        <div class="tab" data-cat="casino">Casino</div>
        <div class="tab" data-cat="virtuales">Virtuales</div>
      </div>

      <input
        id="q"
        type="search"
        placeholder="Busca un equipo, liga, juego…"
        autocomplete="off"
        spellcheck="false"
      />

      <div class="meta">
        <span id="status">Escribe para buscar</span>
        <span id="timing"></span>
      </div>
      <div class="bykind" id="bykind"></div>
      <div id="suggestions"></div>

      <div id="results" class="results"></div>
    </div>

    <script>
      // Auto-detect: localhost → stack docker local; cualquier otro host → dev en kurax.
      const API_BASE =
        location.hostname === "localhost" || location.hostname === "127.0.0.1"
          ? "http://localhost:3061/bsn-metasearch/v1"
          : "https://search-gaming.api.dev.kurax.dev/bsn-metasearch/v1";
      document.getElementById("apiLabel").textContent = API_BASE;

      // Cada categoría: endpoint, cómo extraer la lista, y cómo normalizar un item.
      const CATEGORIES = {
        todo: {
          url: (q) => `${API_BASE}/products/search?q=${encodeURIComponent(q)}`,
          list: (d) => d.products || [],
          norm: (p) => ({
            kind: p.kind,
            title: p.title,
            gender: p.document?.gender,
            tags: (p.subtitle || "").split(" · ").filter(Boolean),
          }),
        },
        deportes: {
          url: (q) => `${API_BASE}/sports-events/search?q=${encodeURIComponent(q)}`,
          list: (d) => d.events || [],
          norm: (e) => ({
            kind: "sport-event",
            title: e.eventName,
            live: e.isLive,
            gender: e.gender,
            tags: [e.sportName, e.leagueName, e.regionName, e.startEventDate].filter(Boolean),
          }),
        },
        casino: {
          url: (q) => `${API_BASE}/casino-games/search?q=${encodeURIComponent(q)}`,
          list: (d) => d.games || [],
          norm: (g) => ({
            kind: "casino-game",
            title: g.name,
            tags: [g.provider, g.type].filter(Boolean),
          }),
        },
        virtuales: {
          url: (q) => `${API_BASE}/virtual-games/search?q=${encodeURIComponent(q)}`,
          list: (d) => d.games || [],
          norm: (g) => ({
            kind: "virtual-game",
            title: g.name,
            tags: [g.provider, g.type].filter(Boolean),
          }),
        },
      };

      let activeCat = "todo";
      let lastReq = 0;

      const $q = document.getElementById("q");
      const $results = document.getElementById("results");
      const $status = document.getElementById("status");
      const $timing = document.getElementById("timing");
      const $bykind = document.getElementById("bykind");
      const $tabs = document.getElementById("tabs");

      const debounce = (fn, ms) => {
        let t;
        return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
      };

      const escapeHtml = (s) =>
        String(s ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

      const highlight = (text, q) => {
        const safe = escapeHtml(text);
        const tokens = q.split(/\s+/).filter((t) => t.length >= 2);
        if (!tokens.length) return safe;
        const re = new RegExp("(" + tokens.map((t) => t.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|") + ")", "gi");
        return safe.replace(re, "<mark>$1</mark>");
      };

      const KIND_LABEL = {
        "sport-event": "deporte",
        "casino-game": "casino",
        "virtual-game": "virtual",
      };

      // Clasificación (género + tier de liga) y orden vienen del backend.
      // El frontend solo consume `gender` y mantiene el orden que recibe.

      function card(item, q) {
        const kindBadge =
          activeCat === "todo"
            ? `<span class="kind kind-${item.kind}">${KIND_LABEL[item.kind] || item.kind}</span>`
            : "";
        const liveBadge = item.live ? `<span class="live">● EN VIVO</span>` : "";
        const genderBadge = item.gender === "F"
          ? `<span class="gender gender-f">♀ MUJERES</span>`
          : (item.kind === "sport-event" ? `<span class="gender gender-m">♂ HOMBRES</span>` : "");
        const tags = item.tags.map((t) => `<span class="pill">${escapeHtml(t)}</span>`).join("");
        return `
          <div class="card">
            <div class="name">${highlight(item.title || "", q)}</div>
            <div class="row">${kindBadge}${liveBadge}${genderBadge}${tags}</div>
          </div>`;
      }

      const $suggestions = document.getElementById("suggestions");

      // Si el backend devolvió aliasSuggestions (alias con múltiples entidades,
      // ej: "messi" → ["Inter Miami", "Argentina"]), mostramos chips clickeables
      // para que el usuario refine. Click = reemplaza el input y dispara una
      // nueva búsqueda con la entidad específica.
      function renderSuggestions(suggestions) {
        if (!Array.isArray(suggestions) || suggestions.length === 0) {
          $suggestions.innerHTML = "";
          return;
        }
        const chips = suggestions
          .map((s) => `<span class="suggestion-chip" data-label="${escapeHtml(s.label)}">${escapeHtml(s.label)}</span>`)
          .join("");
        $suggestions.innerHTML = `<div class="suggestions"><span class="suggestions-label">Quizás buscas:</span>${chips}</div>`;
        $suggestions.querySelectorAll(".suggestion-chip").forEach((el) => {
          el.addEventListener("click", () => {
            $q.value = el.dataset.label;
            search();
            $q.focus();
          });
        });
      }

      function renderByKind(data) {
        if (activeCat !== "todo" || !data.byKind) { $bykind.innerHTML = ""; return; }
        const k = data.byKind;
        $bykind.innerHTML = [
          `<span class="pill">deportes: ${k.sportEvents}</span>`,
          `<span class="pill">casino: ${k.casinoGames}</span>`,
          `<span class="pill">virtuales: ${k.virtualGames}</span>`,
        ].join("");
      }

      const search = debounce(async () => {
        const q = $q.value.trim();
        $bykind.innerHTML = "";
        if (q.length < 2) {
          $results.innerHTML = "";
          $status.textContent = "Escribe al menos 2 caracteres";
          $timing.textContent = "";
          return;
        }
        const reqId = ++lastReq;
        $status.textContent = "Buscando…";
        const cat = CATEGORIES[activeCat];
        try {
          const r = await fetch(cat.url(q));
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const data = await r.json();
          if (reqId !== lastReq) return;

          const items = cat.list(data).map(cat.norm);
          $timing.textContent = data.searchTime != null ? `${data.searchTime} ms` : "";
          renderByKind(data);
          renderSuggestions(data.aliasSuggestions);

          if (!items.length) {
            $results.innerHTML = `<div class="empty">Sin resultados para «${escapeHtml(q)}»</div>`;
            $status.textContent = "0 resultados";
            return;
          }
          $status.textContent = `${data.total ?? items.length} resultado${(data.total ?? items.length) === 1 ? "" : "s"}`;
          $results.innerHTML = items.map((it) => card(it, q)).join("");
        } catch (err) {
          if (reqId !== lastReq) return;
          $status.innerHTML = `<span class="err">Error: ${escapeHtml(err.message)}</span>`;
          $results.innerHTML = "";
          $timing.textContent = "";
        }
      }, 350);

      $q.addEventListener("input", search);

      $tabs.addEventListener("click", (e) => {
        const tab = e.target.closest(".tab");
        if (!tab) return;
        activeCat = tab.dataset.cat;
        document.querySelectorAll(".tab").forEach((t) => t.classList.toggle("active", t === tab));
        search();
        $q.focus();
      });

      // ─────────────────────────────────────────────────────────────────
      // Debug panel: muestra qué tiene el backend conectado
      // (IA, dictionary, aliases, equipos, conteo de typesense).
      // Solo consume `${API_BASE}/debug`. Si ese endpoint no existe (versión
      // vieja del backend), muestra "no disponible" sin romper la página.
      // ─────────────────────────────────────────────────────────────────
      const $debugFab = document.createElement("button");
      $debugFab.className = "debug-fab";
      $debugFab.textContent = "🐞 Debug";
      const $debugPanel = document.createElement("div");
      $debugPanel.className = "debug-panel hidden";
      document.body.appendChild($debugFab);
      document.body.appendChild($debugPanel);

      const pill = (ok, label) => {
        const cls = ok === true ? "debug-ok" : ok === false ? "debug-bad" : "debug-warn";
        return `<span class="debug-pill ${cls}">${label}</span>`;
      };
      const row = (k, v) => `<div class="debug-row"><span>${k}</span><span>${v}</span></div>`;

      async function loadDebug() {
        $debugPanel.innerHTML = "<h3>Cargando…</h3>";
        try {
          const r = await fetch(`${API_BASE}/debug`);
          if (!r.ok) throw new Error(`HTTP ${r.status}`);
          const d = await r.json();
          renderDebug(d);
        } catch (err) {
          $debugPanel.innerHTML = `
            <h3>Debug</h3>
            <div class="err">No se pudo obtener /debug: ${escapeHtml(err.message)}</div>
            <div style="color:#94a3b8;margin-top:6px;font-size:11px">
              Posible: backend desplegado no tiene este endpoint todavía (necesita el MR de observabilidad).
            </div>
            <div class="debug-actions">
              <button class="debug-btn" id="debugReload">Reintentar</button>
              <button class="debug-btn" id="debugClose">Cerrar</button>
            </div>`;
          document.getElementById("debugReload").addEventListener("click", loadDebug);
          document.getElementById("debugClose").addEventListener("click", () => $debugPanel.classList.add("hidden"));
        }
      }

      function renderDebug(d) {
        const bedrockPill = !d.bedrock.enabled
          ? pill(null, "DISABLED (lexical-only)")
          : d.bedrock.healthy
            ? pill(true, "OK")
            : pill(false, "DOWN");
        const dictPill = !d.dictionary.enabled
          ? pill(null, "DISABLED")
          : d.dictionary.healthy
            ? pill(true, "OK")
            : pill(false, "DOWN");
        $debugPanel.innerHTML = `
          <h3>Estado del backend <span style="color:#94a3b8;font-weight:normal">/debug</span></h3>

          <div class="debug-section">
            <h4>Servicio</h4>
            ${row("nombre", escapeHtml(d.service.name))}
            ${row("versión", escapeHtml(d.service.version))}
            ${row("env", escapeHtml(d.service.node_env))}
            ${row("uptime", d.service.uptime_seconds + "s")}
          </div>

          <div class="debug-section">
            <h4>IA — AWS Bedrock</h4>
            ${row("estado", bedrockPill)}
            ${row("modelo", escapeHtml(d.bedrock.model))}
            ${row("dimensión", d.bedrock.dimensions)}
            ${row("región", escapeHtml(d.bedrock.region))}
          </div>

          <div class="debug-section">
            <h4>Dictionary (SymSpell)</h4>
            ${row("estado", dictPill)}
            ${row("URL", escapeHtml(d.dictionary.base_url || "(no seteada)"))}
          </div>

          <div class="debug-section">
            <h4>Datos cargados al startup</h4>
            ${row("aliases", `<b>${d.aliases.loaded}</b> entries`)}
            ${row("equipos", `<b>${d.teams.loaded}</b> teams`)}
          </div>

          <div class="debug-section">
            <h4>Typesense — ${escapeHtml(d.typesense.host)}:${d.typesense.port}</h4>
            ${row("sport_events", d.typesense.collections.sport_events.exists
              ? `<b>${d.typesense.collections.sport_events.documents}</b> docs`
              : pill(false, "NO EXISTE"))}
            ${row("casino_games", d.typesense.collections.casino_games.exists
              ? `<b>${d.typesense.collections.casino_games.documents}</b> docs`
              : pill(false, "NO EXISTE"))}
          </div>

          <div class="debug-section">
            <h4>Qué pedir a DevOps si algo está mal</h4>
            <div style="color:#94a3b8;font-size:11px;line-height:1.5">
              ${!d.bedrock.enabled ? "• <b>IA DISABLED</b>: revisar <code>BEDROCK_MODE=real</code> en el deployment.<br>" : ""}
              ${d.bedrock.enabled && !d.bedrock.healthy ? "• <b>Bedrock DOWN</b>: ver logs <code>[BEDROCK_DOWN]</code> en CloudWatch — IAM/quota/network.<br>" : ""}
              ${d.dictionary.enabled && !d.dictionary.healthy ? "• <b>Dictionary DOWN</b>: ver pod mtb-dictionary, logs <code>[DICT_FETCH_FAIL]</code>.<br>" : ""}
              ${d.aliases.loaded === 0 ? "• <b>aliases vacíos</b>: ver <code>[ALIASES_MISSING/EMPTY]</code> — montar data/aliases.json.<br>" : ""}
              ${d.teams.loaded === 0 ? "• <b>teams vacíos</b>: ver <code>[TEAMS_EMPTY]</code> — montar data/teams.json.<br>" : ""}
              ${!d.typesense.collections.sport_events.exists ? "• <b>sport_events no existe</b>: revisar indexer, que haya corrido /index/init.<br>" : ""}
              ${!d.typesense.collections.casino_games.exists ? "• <b>casino_games no existe</b>: revisar indexer/games-stream Lambda.<br>" : ""}
              ${d.bedrock.healthy && d.dictionary.healthy && d.aliases.loaded > 0 && d.teams.loaded > 0 && d.typesense.collections.sport_events.exists && d.typesense.collections.casino_games.exists ? "• Todo OK ✓" : ""}
            </div>
          </div>

          <div class="debug-actions">
            <button class="debug-btn" id="debugReload">↻ Refrescar</button>
            <button class="debug-btn" id="debugClose">Cerrar</button>
          </div>
        `;
        document.getElementById("debugReload").addEventListener("click", loadDebug);
        document.getElementById("debugClose").addEventListener("click", () => $debugPanel.classList.add("hidden"));
      }

      $debugFab.addEventListener("click", () => {
        $debugPanel.classList.toggle("hidden");
        if (!$debugPanel.classList.contains("hidden")) loadDebug();
      });
    </script>
  </body>
</html>
